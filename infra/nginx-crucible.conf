map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name runcrucible.xyz www.runcrucible.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://runcrucible.xyz$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name runcrucible.xyz www.runcrucible.xyz;

    ssl_certificate     /etc/letsencrypt/live/runcrucible.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/runcrucible.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── WebSocket stream (must come before /api and /) ─────────────────────
    location /stream/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        rewrite            ^/api/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    # ── Frontend SPA ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5174;
        proxy_set_header   Host       $host;
    }
}
